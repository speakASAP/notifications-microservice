apiVersion: v1
kind: ConfigMap
metadata:
  name: notifications-microservice-config
  namespace: statex-apps
  labels:
    app: notifications-microservice
    managed-by: k8s-migration
data:
  NODE_ENV: "production"
  SERVICE_NAME: "notifications-microservice"
  DOMAIN: "notifications.alfares.cz"
  PORT: "3368"
  CORS_ORIGIN: "*"
  AUTH_SERVICE_URL: "http://auth-microservice.statex-apps.svc.cluster.local:3370"
  DB_HOST: "db-server-postgres"
  DB_PORT: "5432"
  DB_USER: "dbadmin"
  DB_NAME: "notifications"
  DB_SYNC: "false"
  DB_AUTO_CREATE: "true"
  RABBITMQ_URL: "amqp://guest:guest@rabbitmq:5672"
  SENDGRID_FROM_EMAIL: "noreply@flipflop.alfares.cz"
  SENDGRID_FROM_NAME: "flipflop.alfares.cz"
  TELEGRAM_BOT_USERNAME: "StatexNotificationsBot"
  TELEGRAM_CHAT_ID: "694579866"
  TELEGRAM_API_URL: "https://api.telegram.org/bot"
  WHATSAPP_BUSINESS_ACCOUNT_ID: "1513428736736732"
  WHATSAPP_PHONE_NUMBER_ID: "771296492737010"
  WHATSAPP_VERIFY_TOKEN: "your_whatsapp_verify_token_here"
  WHATSAPP_API_URL: "https://graph.facebook.com/v18.0"
  LOG_LEVEL: "info"
  LOGGING_SERVICE_URL: "http://logging-microservice.statex-apps.svc.cluster.local:3367"
  EMAIL_PROVIDER: "auto"
  AWS_SES_REGION: "eu-central-1"
  AWS_SES_FROM_EMAIL: "contact@speakasap.com"
  AWS_SES_FROM_NAME: "SpeakASAP"
  AWS_SES_SNS_TOPIC_ARN: "arn:aws:sns:eu-central-1:781206275849:inbound-email-speakasap"
  AWS_SES_S3_BUCKET: "speakasap-email-forward"
  AWS_SES_S3_OBJECT_KEY_PREFIX: "forwards/"
  HELPDESK_WEBHOOK_URL: "https://speakasap.com/helpdesk/api/email/inbound/"
  EMAIL_FORWARDING_RULES: '{"stashok@speakasap.com": "ssfskype@gmail.com"}'
  PAYMENT_SERVICE_URL: "http://192.168.88.53:3468"
  PAYMENT_CALLBACK_URL: "https://notifications.alfares.cz/api/webhooks/payment-result"
  PAYMENT_SUCCESS_URL: "https://notifications.alfares.cz/payment-result?status=completed"
  PAYMENT_CANCEL_URL: "https://notifications.alfares.cz/payment-result?status=cancelled"
  ORCHESTRATOR_URL: "http://runlayer.statex-apps.svc.cluster.local:3390"
  AI_SERVICE_URL: "http://ai-microservice.statex-apps.svc.cluster.local:3380"
  ORDERS_EVENTS_CONSUMER_ENABLED: "true"
  ORDERS_EVENTS_EXCHANGE: "orders.events"
  ORDERS_EVENTS_QUEUE: "notifications.orders.lifecycle"
  ORDERS_EVENTS_ROUTING_KEYS: "orders.order.created.v1,orders.order.updated.v1,orders.order.paid.v1,orders.order.shipped.v1,orders.order.cancelled.v1,orders.order.lifecycle_changed.v1"
  ORDERS_EVENTS_DEAD_LETTER_EXCHANGE: "notifications.orders.lifecycle.dlx"
  ORDERS_EVENTS_DEAD_LETTER_QUEUE: "notifications.orders.lifecycle.dlq"
  ORDERS_EVENTS_PREFETCH: "1"
  ORDERS_EVENTS_REQUEUE_ON_ERROR: "false"
  ORDERS_EVENTS_NOTIFICATION_CHANNEL_KEY: "orders.lifecycle"
  ORDERS_EVENTS_NOTIFICATION_RECIPIENT: "ssfskype@gmail.com"
